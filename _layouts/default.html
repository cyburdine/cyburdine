<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self'; connect-src 'self';">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <div class="terminal-container">
    <div class="terminal-screen">
	  <canvas id="glitchCanvas"></canvas>
      {% include header.html %}
        <main>
          {{ content }}
        </main>
	  {% include footer.html %}      
    </div>
      <!-- FRAME OVERLAY sits on top -->
    <img src="/assets/images/terminal-full.webp" alt="Terminal Frame" class="terminal-frame" />
  </div>


<!-- site javascripts -->
  <script src="{{ '/assets/js/decode.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/video_glitch.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/visitor_metadata.js' | relative_url }}"></script>
</body>
</html>
