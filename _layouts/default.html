<!DOCTYPE html>
{%- comment -%} Per-build version to bust the CDN/browser cache on every deploy. {%- endcomment -%}
{%- assign asset_v = site.time | date: '%s' -%}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self'; connect-src 'self'; frame-src https://www.youtube-nocookie.com;">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="/assets/css/style.css?v={{ asset_v }}">
</head>
<body>
  <div class="terminal-wrapper">
  <div class="terminal-container">
    <div class="terminal-screen">
	  <canvas id="glitchCanvas"></canvas>
      {% include header.html %}
        <main>
          {{ content }}
        </main>
	  {% include footer.html %}      
    </div>
      <!-- FRAME OVERLAY sits on top -->
    <img src="/assets/images/terminal-full.webp" alt="Terminal Frame" class="terminal-frame" />
    <!-- Easter eggs: invisible links over the "4" and "D" keys replay the boot -->
    <a href="#" class="cy-egg cy-egg--four" aria-label="Reboot terminal"></a>
    <a href="#" class="cy-egg cy-egg--d" aria-label="Reboot terminal"></a>
  </div>
  </div>


<!-- site javascripts -->
  <!-- boot.js first: sets the pre-paint guard + boot flag before others parse -->
  <script src="{{ '/assets/js/boot.js' | relative_url }}?v={{ asset_v }}"></script>
  <script src="{{ '/assets/js/render.js' | relative_url }}?v={{ asset_v }}"></script>
  <script src="{{ '/assets/js/video_glitch.js' | relative_url }}?v={{ asset_v }}"></script>
  <script src="{{ '/assets/js/responsive.js' | relative_url }}?v={{ asset_v }}"></script>
</body>
</html>
